# application-dev.yml
spring:
  datasource:
    url: jdbc:mysql://localhost:3307/projet_jee?createDatabaseIfNotExist=true
    username: root
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs
    enabled: true