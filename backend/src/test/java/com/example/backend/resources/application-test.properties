# ============================================================
# Test profile — H2 in-memory database (true integration tests)
# Place in: src/test/resources/application-test.properties
# ============================================================

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA — recreate schema before each test run
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# IMPORTANT: disable data.sql auto-execution during tests
# (data.sql inserts roles which conflict with @DirtiesContext resets)
spring.sql.init.mode=never

# Suppress Spring Boot banner in test output
spring.main.banner-mode=off

# JWT secret — minimum 256 bits for HS256
app.jwtSecret=TestSecretKeyForIntegrationTestsOnlyNotForProduction12345
app.jwtExpirationMs=3600000