# ============================================================
# Configuration de test – Base H2 en mémoire
# Fichier à placer dans : src/test/resources/
# ============================================================

# Source de données H2 en mémoire (remplace MySQL/SQL Server pendant les tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate : création automatique du schéma à chaque lancement
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Désactive la bannière Spring Boot dans les logs de test
spring.main.banner-mode=off

# JWT factice pour les tests (doit être ≥ 256 bits pour HS256)
app.jwtSecret=TestSecretKeyForJUnitTestsOnlyDoNotUseInProduction1234567890
app.jwtExpirationMs=3600000